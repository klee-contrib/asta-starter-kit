name: asta-starter-kit
services:
  db:
    image: postgres:latest
    ports:
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=asta
      - POSTGRES_USER=asta
      - POSTGRES_DB=asta
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
  user-db:
    image: postgres:latest
    ports:
      - 5433:5432
    environment:
      - POSTGRES_PASSWORD=asta
      - POSTGRES_USER=asta
      - POSTGRES_DB=asta
  auth:
    image: keycloak/keycloak:26.6.0
    ports:
      - 8090:8080
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=asta
      - KC_DB=postgres
      - DB_ADDR=user-db
      - KC_DB_URL=jdbc:postgresql://user-db:5432/asta
      - DB_PORT=5432
      - KC_DB_USERNAME=asta
      - KC_DB_PASSWORD=asta
      - KC_HOSTNAME=localhost
      - IMPORT_REALM=true
    command: start-dev --import-realm
    volumes:
      - ./auth/:/opt/keycloak/data/import
    depends_on:
      - user-db
