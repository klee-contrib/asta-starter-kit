# yaml-language-server: $schema=./workflow.schema.json
name: mr-review
description: >-
  Relit automatiquement une pull request GitHub du dépôt projet (déclenchée à son ouverture). Vérifie
  build et tests sur la stack impactée, contrôle l'état de la CI et la qualité du diff, puis FUSIONNE
  la PR si tout est au vert. Sinon, laisse la PR ouverte avec une revue structurée des points
  bloquants.
inputs:
  event:
    description: >-
      Payload brute de l'évènement GitHub « pull_request » (action = opened). Contient le numéro de la
      PR, le dépôt (owner/name), les branches source et cible, le SHA de tête, l'auteur et le titre.
steps:
  - id: collect_context
    title: Collecter le contexte de la PR
    agent: pr-reviewer
    mode: read-only
    prompt: >-
      Payload de l'évènement : {{ inputs.event }}

      À partir de ce payload, identifie la pull request : dépôt (owner/name), numéro de PR, branche
      source (head) et branche cible (base), SHA de tête, titre et auteur.

      Via le MCP github, récupère UNIQUEMENT pour cette PR :
      1. Le titre, la description et la liste des fichiers modifiés (avec ajouts/suppressions).
      2. Le diff complet.
      3. L'état des checks CI pour le SHA de tête : workflow runs et check runs, avec leur conclusion
      (success / failure / neutral / en cours). Indique clairement si la CI est verte, rouge ou
      incomplète.
      4. Les reviews et fils de discussion existants (approbations, changements demandés).

      Détermine aussi quelles stacks sont impactées d'après les chemins modifiés : frontend
      (« sources/frontend »), backend (« sources/backend »), modèle (« model/ »), infra/autres.

      Retourne un récapitulatif structuré : identité PR (dépôt, numéro, branches, SHA), stacks
      impactées, synthèse du diff, état CI, revues existantes.
  - id: verify
    title: Vérifier build et tests
    agent: tester
    mode: edit
    receives:
      - collect_context
    prompt: >-
      Contexte de la PR : {{ steps.collect_context.result }}

      Place-toi sur le code de la PR : récupère et checkout la branche source (ex.
      « git fetch origin <branche-source> && git checkout <branche-source> »).

      Lance build et tests UNIQUEMENT pour les stacks impactées par la PR (voir contexte) :
      - Frontend (si « sources/frontend » modifié) : « cd sources/frontend && npm ci && npm run build »
        (DOIT compiler) puis « npm test » en mode non-watch (CI).
      - Backend (si « sources/backend » modifié) : « cd sources/backend && mvn -q clean install » puis
        « mvn test » (DOIT être vert).
      - Modèle (si « model/ » modifié) : vérifie que les contrats générés (front et back) ne sont pas
        cassés.

      Ne relance pas une stack non touchée. Reporte pour chaque stack exécutée : commande, résultat
      (VERT / ROUGE) et extrait d'erreur le cas échéant. Conclus par un verdict global : build et
      tests VERTS ou ROUGES.
  - id: review
    title: Relire le diff
    agent: pr-reviewer
    mode: read-only
    receives:
      - collect_context
      - verify
    prompt: >-
      Contexte de la PR : {{ steps.collect_context.result }}

      Résultat build/tests locaux : {{ steps.verify.result }}

      Relis le diff de la PR et évalue :
      - Correction : bugs, régressions, cas limites, cohérence front/back/contrats TopModel.
      - Sécurité : secrets en clair, injections, contrôle d'accès, dépendances à risque.
      - Qualité : lisibilité, duplication, respect des conventions du projet.
      - Règles projet (voir .agentic/instructions.md) : commits conventionnels, AUCUNE attribution IA
        dans les commits, pas de régénération TopModel injustifiée ni de rupture des contrats générés.

      Retourne un verdict explicite : « APPROUVÉ » ou « CHANGEMENTS_REQUIS », avec la liste des points
      BLOQUANTS (chacun rattaché à un fichier/ligne) et des points non bloquants (suggestions).
  - id: merge_or_report
    title: Fusionner ou reporter
    agent: pr-reviewer
    mode: edit
    receives:
      - collect_context
      - verify
      - review
    prompt: >-
      Contexte de la PR : {{ steps.collect_context.result }}

      Build/tests locaux : {{ steps.verify.result }}

      Revue du code : {{ steps.review.result }}

      Décision de fusion — applique une politique STRICTE. Fusionne la PR via le MCP github SEULEMENT
      si TOUS ces critères sont simultanément vrais :
      1. Build et tests locaux VERTS (étape verify).
      2. CI/checks GitHub au vert pour le SHA de tête (aucune conclusion failure, aucun check
         obligatoire en échec ou manquant).
      3. Revue = « APPROUVÉ » sans AUCUN point bloquant.

      SI tous les critères sont remplis :
      - Fusionne la PR (méthode squash de préférence), en conservant un message de commit conventionnel
        dérivé du titre de la PR (sans aucune attribution IA).
      - Supprime la branche source si le dépôt le permet.
      - Poste un bref commentaire d'approbation résumant les vérifications passées.

      SINON (au moins un critère non satisfait) :
      - NE FUSIONNE PAS, laisse la PR ouverte.
      - Poste une review « CHANGEMENTS_REQUIS » structurée listant précisément chaque point bloquant
        (build/tests rouges, CI rouge, ou remarques de revue) et ce qui est attendu pour débloquer.

      Retourne : décision finale (FUSIONNÉE / LAISSÉE OUVERTE), le détail des critères (satisfait /
      non satisfait), l'URL de la PR et, si fusionnée, le SHA du commit de fusion.
