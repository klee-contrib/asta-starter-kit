name: Je-réalise-une-fonctionnalité
inputs:
  event: {}
steps:
  - id: etape-9
    title: transformer une source fonctionnelle, documentaire ou projet en un ensemble cohérent
    agent: Jeruf-:-Etape-1-lecture-et-découpage
    mode: edit
    prompt: >-
      Tu va recevoir un payload provenant d'un webhook gitlab, dedans tu va trouver {{ inputs.event
      }} une instruction c'est elle qui te permet de faire la fonctionnalité.



      Analyse la source suivante et produis un plan d’implémentation consolidé.


      ## Exécution


      * Identifiant : `{{execution_id}}`

      * Version du schéma : `{{schema_version}}`

      * Dépôt local : `{{repository_root}}`

      * Branche ou commit de référence : `{{repository_reference}}`


      ## Source initiale


      * Type déclaré : `{{source_type}}`

      * Référence principale : `{{source_reference}}`

      * Références complémentaires : `{{additional_source_references}}`


      ## Contexte fourni


      {{input_context}}


      ## Contraintes spécifiques


      {{execution_constraints}}


      ## Exclusions connues


      {{known_exclusions}}


      ## Outils disponibles


      {{available_tools}}


      Utilise les outils MCP disponibles pour récupérer le contexte associé à la source.


      Inspecte également le dépôt local afin de vérifier le fonctionnement actuel, les composants
      concernés, les conventions et les dépendances.


      Détermine si le périmètre contient :


      * une fonctionnalité ;

      * plusieurs fonctionnalités ;

      * un Epic ;

      * des travaux techniques ;

      * ou un périmètre mixte.


      Découpe ensuite le besoin en unités de sens et délègue chaque unité au sous-agent
      `UnitImplementationPlanner`.


      Consolide les résultats en supprimant les doublons, en résolvant les contradictions et en
      organisant les tâches selon leurs dépendances.


      ## Paramètres d’exécution


      * Nombre maximal de sous-agents simultanés : `{{max_parallel_agents}}`

      * Nombre maximal de tentatives de correction : `{{max_agent_retries}}`

      * Niveau minimal de confiance accepté : `{{minimum_confidence}}`

      * Autoriser les hypothèses non bloquantes : `{{allow_non_blocking_assumptions}}`


      ## Résultat attendu


      Retourne uniquement un objet JSON conforme au JSON Schema `{{output_schema_id}}`.


      Le résultat doit contenir au minimum :


      * le périmètre identifié ;

      * les sources analysées ;

      * les fonctionnalités ;

      * les unités de sens ;

      * les tâches consolidées ;

      * les dépendances ;

      * l’ordre d’exécution ;

      * les critères d’acceptation ;

      * les risques ;

      * les questions ouvertes ;

      * la matrice de traçabilité ;

      * les erreurs éventuelles des sous-agents ;

      * le niveau de couverture global.
  - id: etape-13
    title: piloter l’exécution technique d’un plan d’implémentation validé.
    agent: ImplementationOrchestrator
    mode: edit
    receives:
      - etape-9
    prompt: >-
      Exécute le plan d’implémentation fourni en pilotant les sous-agents `UnitImplementer`.


      # Exécution


      * Identifiant : `{{execution_id}}`

      * Version du schéma : `{{schema_version}}`

      * Dépôt local : `{{repository_root}}`


      # Configuration Git


      * Branche cible : `{{target_branch}}`

      * Commit cible attendu : `{{expected_target_commit}}`

      * Nom de la branche générale : `{{integration_branch}}`

      * Préfixe des branches de réalisation : `{{worker_branch_prefix}}`

      * Répertoire racine des worktrees : `{{worktrees_root}}`

      * Stratégie de fusion : `{{merge_strategy}}`

      * Fusion automatique dans la branche cible : `{{merge_into_target}}`

      * Politique de conservation des branches : `{{branch_cleanup_policy}}`

      * Politique de conservation des worktrees : `{{worktree_cleanup_policy}}`


      Avant toute modification, vérifie que le commit courant de la branche cible correspond à
      `expected_target_commit`.


      En cas de différence, retourne une erreur structurée et ne crée aucune branche, sauf si
      `{{allow_target_commit_drift}}` vaut `true`.


      # Plan d’implémentation


      {{implementation_plan}}


      # Sources et traçabilité


      {{traceability_context}}


      # Décisions d’architecture


      {{architecture_decisions}}


      # Contraintes spécifiques


      {{execution_constraints}}


      # Validations globales obligatoires


      {{global_required_checks}}


      # Paramètres d’orchestration


      * Nombre maximal de réalisateurs simultanés : `{{max_parallel_implementers}}`

      * Nombre maximal de tentatives par lot : `{{max_attempts_per_work_package}}`

      * Nombre maximal de lots correctifs : `{{max_corrective_work_packages}}`

      * Autoriser les résolutions de conflits simples : `{{allow_simple_conflict_resolution}}`

      * Autoriser les modifications hors périmètre : `{{allow_scope_expansion}}`

      * Arrêter après le premier échec bloquant : `{{stop_on_first_blocking_failure}}`


      # Consignes d’exécution


      1. vérifie l’état du dépôt ;

      2. crée la branche générale depuis le commit cible ;

      3. inspecte le dépôt et valide le plan reçu ;

      4. transforme les tâches en `work_packages` ;

      5. construis leur graphe de dépendances ;

      6. définis les phases et groupes parallèles ;

      7. crée les branches et worktrees uniquement lorsque les lots sont prêts ;

      8. délègue chaque lot à un `UnitImplementer` ;

      9. contrôle chaque résultat dans le dépôt ;

      10. fusionne progressivement les lots validés ;

      11. crée les lots correctifs nécessaires ;

      12. exécute les validations après chaque fusion et chaque phase ;

      13. exécute les validations globales finales ;

      14. retourne l’état consolidé de l’exécution.


      # Schéma de sortie


      Retourne uniquement un objet JSON conforme au JSON Schema :


      `{{output_schema_id}}`


      Le résultat doit notamment contenir :


      * l’état global de l’exécution ;

      * la branche cible et son commit initial ;

      * la branche générale et ses commits initial et final ;

      * le plan d’exécution ;

      * les phases ;

      * les groupes parallèles ;

      * les `work_packages` ;

      * les branches et worktrees associés ;

      * les résultats des réalisateurs ;

      * les commits des réalisateurs ;

      * les fusions ;

      * les conflits ;

      * les corrections ;

      * les validations ciblées et globales ;

      * la couverture des tâches ;

      * la couverture des critères d’acceptation ;

      * les erreurs ;

      * les travaux restants.


      # Valeurs de statut


      Le champ `status` doit être :


      * `success` si tous les lots obligatoires sont fusionnés et validés ;

      * `partial` si une partie cohérente est intégrée mais que certains éléments restent incomplets
      ;

      * `failure` si aucune branche générale fiable ne peut être produite.


      Même avec un statut `partial` ou `failure`, retourne toujours un objet complet conforme au
      schéma.
  - id: etape-14
    title: vérifier l’implémentation consolidée produite
    agent: ImplementationVerifier
    mode: edit
    receives:
      - etape-13
    prompt: >-
      Vérifie l’implémentation consolidée fournie ci-dessous.


      # Exécution


      * Identifiant de l’exécution : `{{execution_id}}`

      * Identifiant de la vérification : `{{verification_id}}`

      * Version du schéma : `{{schema_version}}`

      * Dépôt local : `{{repository_root}}`


      # Références Git


      * Branche cible : `{{target_branch}}`

      * Commit initial de la branche cible : `{{target_initial_commit}}`

      * Branche générale d’intégration : `{{integration_branch}}`

      * Commit d’intégration attendu : `{{expected_integration_commit}}`

      * Worktree de vérification : `{{verification_worktree_path}}`

      * Commit précédemment vérifié : `{{previous_verified_commit}}`


      Vérifie avant toute analyse que le commit actif du worktree correspond exactement à
      `expected_integration_commit`.


      En cas de différence, ne poursuis pas la vérification et retourne `status: "blocked"`.


      # Plan initial


      {{implementation_plan}}


      # Périmètre à vérifier


      ## Fonctionnalités


      {{features}}


      ## Unités de sens


      {{units}}


      ## Tâches


      {{tasks}}


      ## Critères d’acceptation


      {{acceptance_criteria}}


      # Exécution réalisée


      ## Work packages


      {{work_packages}}


      ## Résultats des réalisateurs


      {{implementer_results}}


      ## Commits et fusions


      {{merge_history}}


      ## Erreurs et écarts connus


      {{known_execution_issues}}


      # Sources fonctionnelles et techniques


      {{source_context}}


      # Décisions d’architecture


      {{architecture_decisions}}


      # Risques et questions ouvertes


      {{known_risks_and_questions}}


      # Validations obligatoires


      {{required_checks}}


      # Paramètres de vérification


      * Exécuter les tests globaux : `{{run_global_tests}}`

      * Exécuter les tests end-to-end : `{{run_end_to_end_tests}}`

      * Exécuter les analyses de sécurité : `{{run_security_checks}}`

      * Exécuter les analyses de performances : `{{run_performance_checks}}`

      * Autoriser les validations manuelles : `{{allow_manual_checks}}`

      * Considérer les constats `major` comme bloquants : `{{major_findings_are_blocking}}`

      * Nombre maximal de lots correctifs : `{{max_corrective_work_packages}}`

      * Niveau minimal de confiance : `{{minimum_confidence}}`


      # Vérification demandée


      Tu dois :


      1. vérifier l’état Git et le commit analysé ;

      2. analyser le diff global depuis `target_initial_commit` ;

      3. vérifier la traçabilité des tâches et critères d’acceptation ;

      4. vérifier la conformité fonctionnelle ;

      5. analyser la qualité et la pertinence des tests ;

      6. exécuter les validations ciblées ;

      7. exécuter les validations globales obligatoires ;

      8. vérifier l’architecture ;

      9. vérifier les données, migrations et contrats lorsque concernés ;

      10. vérifier la sécurité, les performances et l’observabilité lorsque concernés ;

      11. vérifier l’intégration entre les work packages ;

      12. classifier les constats ;

      13. proposer les lots correctifs nécessaires ;

      14. produire une décision finale.


      # Vérification après correction


      Lorsque `previous_verified_commit` n’est pas nul :


      * analyse les changements entre `previous_verified_commit` et `expected_integration_commit` ;

      * vérifie ensuite l’état consolidé complet ;

      * réévalue les constats précédents fournis ci-dessous ;

      * conserve leurs identifiants.


      ## Résultat de vérification précédent


      {{previous_verification_result}}


      # Schéma de sortie


      Retourne uniquement un objet JSON conforme au JSON Schema :


      `{{output_schema_id}}`


      Le résultat doit notamment contenir :


      * le statut de la vérification ;

      * la décision finale ;

      * les références Git vérifiées ;

      * la traçabilité des tâches ;

      * la couverture des critères d’acceptation ;

      * les commandes exécutées ;

      * les zones de revue ;

      * les constats ;

      * leurs preuves ;

      * leur sévérité ;

      * les lots correctifs ;

      * les éléments non vérifiables ;

      * le niveau de confiance ;

      * l’état de préparation pour la fusion cible.


      Même en cas de statut `partial`, `blocked` ou `failure`, retourne toujours un objet complet
      conforme au schéma.
