name: angular-upgrade
description: >-
  Mise à jour périodique d'un projet Angular (dépôt/workspace courant) vers la dernière version
  stable du major courant (montées patch et minor autorisées, jamais de saut majeur). Les tags,
  releases et documentation sont lus exclusivement depuis le dépôt officiel angular/angular, jamais
  depuis le dépôt du projet à mettre à jour.
inputs:
  projectPath:
    required: true
    default: ./sources/frontend
    description: Chemin (relatif au dépôt) du workspace Angular à mettre à jour.
  event:
    description: >-
      Payload brute de l'évènement déclencheur (webhook / cron). Ce workflow étant déclenché par
      planification, la payload ne contient rien d'exploitable : le chemin du projet est fourni par
      l'entrée « projectPath », la source des versions est le dépôt officiel angular/angular, et la
      politique de version est fixe (patch/minor uniquement, jamais de saut majeur).
steps:
  - id: fetch_tags
    title: Récupérer les tags Angular
    agent: angular-researcher
    mode: read-only
    prompt: >-
      Source UNIQUE : dépôt officiel Angular « https://github.com/angular/angular» sur GitHub (PAS
      le dépôt du projet client).

      Récupère les tags et releases stables. Liste les versions semver publiées, triées par ordre
      croissant.

      Retourne : liste des versions, dernière version stable, tags LTS éventuels. Aucune lecture du
      workspace projet.
  - id: pick_version
    title: Choisir la version cible
    agent: planner
    mode: read-only
    receives:
      - fetch_tags
    prompt: >-
      Le chemin du projet Angular est fourni par l'entrée « projectPath » : {{ inputs.projectPath }}
      (workspace simple, npm). Lis directement « {{ inputs.projectPath }}/package.json » pour
      relever la version courante de @angular/core et @angular/cli.

      Versions disponibles sur le DÉPÔT OFFICIEL Angular : {{ steps.fetch_tags.result }}

      Choisis comme version cible la DERNIÈRE version stable disponible DANS LE MAJOR COURANT du
      projet (la minor la plus haute du major courant, et son dernier patch) : les montées patch ET
      minor sont autorisées, jamais de saut de version majeure. Si le projet est déjà sur la
      dernière minor du major, cible simplement le dernier patch de cette minor.

      Si la version actuelle de @angular/core est DÉJÀ égale à cette version cible (aucun
      patch/minor plus récent disponible dans le major courant), écris en TOUTE PREMIÈRE ligne du
      retour, mot pour mot : « AUCUNE MISE À JOUR NÉCESSAIRE ». Dans ce cas ne fournis aucune
      commande ng update : les étapes suivantes doivent s'arrêter sans rien modifier ni committer.

      Sinon, retourne : version actuelle, version cible, type de saut (patch/minor/major),
      justification, et commandes ng update exactes (@angular/core@X @angular/cli@X et packages
      associés) à exécuter dans le projet client.
  - id: read_release_notes
    title: Analyser les notes de version et planifier
    agent: angular-researcher
    mode: read-only
    receives:
      - pick_version
    prompt: >-
      Projet client : {{ inputs.projectPath }}.

      Versions (actuelle et cible) : {{ steps.pick_version.result }}

      Si l'étape précédente indique « AUCUNE MISE À JOUR NÉCESSAIRE », ne fais AUCUNE recherche :
      retourne uniquement « Aucune mise à jour nécessaire, rien à analyser » et arrête-toi là.

      Lis les release notes, CHANGELOG et update guide UNIQUEMENT sur «
      https://github.com/angular/angular/ » et la documentation Angular officielle, entre ces deux
      versions.

      Ne pas confondre avec l'historique Git du dépôt projet.

      1. ANALYSE (faits amont) : breaking changes, migrations automatiques Angular, dépréciations,
      prérequis Node.js/npm, actions manuelles requises.

      2. PLAN D'EXÉCUTION (dépôt du projet client) : élabore un plan ordonné — sauvegarde/commit
      préalable, prérequis, séquence ng update (regroupée en une seule commande pour tous les
      packages Angular concernés), migrations, vérifications intermédiaires, rollback si échec.
      Vérifie la disponibilité npm des versions ciblées et ajuste-les si nécessaire (ex.
      Material/CDK parfois en retard sur le core), en justifiant tout écart.
  - id: migrate
    title: Exécuter ng update et migrer le code
    agent: angular-specialist
    mode: edit
    receives:
      - read_release_notes
    prompt: >-
      Cible : PROJET CLIENT uniquement ({{ inputs.projectPath }}). Le chemin exact est fourni par
      l'entrée « projectPath » : ne PAS lister les projets (pas de list_projects), ne PAS lancer de
      « ng update » nu de découverte — les versions et packages exacts sont déjà fournis ci-dessous.

      Plan de migration : {{ steps.read_release_notes.result }}

      Versions (actuelle et cible) : {{ steps.pick_version.result }}

      Si les étapes précédentes indiquent « AUCUNE MISE À JOUR NÉCESSAIRE », NE MODIFIE STRICTEMENT
      RIEN dans le dépôt (aucun fichier de dépendance, de code, de configuration ou de test) et
      retourne uniquement « Aucune mise à jour nécessaire, aucune modification effectuée ». Ne
      cherche pas d'autre prétexte pour modifier le projet (ex. alignement de lockfile, ajout de
      tests) : ce n'est pas l'objet de ce workflow.

      Cette étape ne touche QU'au périmètre de la migration Angular (dépendances, schematics, code
      de production impacté par les breaking changes). N'ajoute ni ne modifie AUCUN fichier de test
      : ce n'est pas de son ressort (voir étape « run_tests »).

      1. EXÉCUTE ng update en UN SEUL appel regroupant TOUS les packages Angular concernés
      (@angular/core, @angular/cli, et le cas échéant @angular/material, @angular/cdk,
      @angular/material-luxon-adapter…) avec leurs versions cibles respectives dans la même
      commande. Cela lance les migrations automatiques (schematics) et évite l'arbre git sali entre
      deux updates et l'échec/retry avec --allow-dirty. N'utilise --force ou --allow-dirty que si
      réellement nécessaire, en le justifiant.

      2. APPLIQUE ensuite les migrations manuelles restantes sur le code du projet, non couvertes
      par les schematics : breaking changes, APIs dépréciées, imports, templates, configuration
      (angular.json, tsconfig, eslint), dépendances peer incompatibles.

      NE PAS builder ni lancer les tests ici : build, tests et lint sont couverts par l'étape «
      run_tests ». Une seule vérification « ng version » suffit pour confirmer les versions
      installées.

      Documente chaque commande exécutée, les sorties, warnings et erreurs éventuelles, ainsi que
      les migrations manuelles appliquées.
  - id: run_tests
    title: Vérifier build et tests
    agent: tester
    mode: edit
    receives:
      - migrate
    prompt: >-
      Projet client : {{ inputs.projectPath }}.

      Versions (actuelle et cible attendue) : {{ steps.pick_version.result }}

      Si les étapes précédentes indiquent « AUCUNE MISE À JOUR NÉCESSAIRE », n'exécute rien et
      retourne uniquement « Aucune mise à jour nécessaire, rien à vérifier ».

      Dans le dépôt DU PROJET : lance ng build (prod si disponible), tests unitaires (--watch=false
      ou équivalent CI), et lint si configuré.

      Vérifie que @angular/core correspond à la version cible dans le package.json du projet client.
      Signale toute régression.

      INTERDIT : n'ajoute et ne modifie AUCUN test, AUCUN fichier de configuration de test
      (tsconfig.spec.json, karma.conf, etc.), et n'invente aucun nouveau cas de test. La seule
      exception tolérée est la correction MINIMALE d'un test EXISTANT cassé par un changement d'API
      couvert par la migration Angular — dans ce cas, adapte uniquement l'assertion ou l'appel
      cassé, sans ajouter de scénario ni de fichier. Si les tests échouent pour une autre raison,
      corrige le code de production, ne modifie pas les tests pour les faire passer.
    review:
      agent: judge
      maxRepeats: 2
      onRedo: resume
      criteria: >-
        Si aucune mise à jour n'était nécessaire, l'étape n'a rien modifié. Sinon : le build passe,
        les tests passent, @angular/core est à la version cible, les migrations sont appliquées, le
        diff ne contient pas de régression critique, et aucun test n'a été ajouté ou modifié en
        dehors d'une correction minimale rendue strictement nécessaire par la migration.
      onExhausted:
        goto: migrate
        maxLoops: 1
        then: fail
  - id: commit_main
    title: Committer la montée de version sur main
    agent: github-publisher
    mode: edit
    receives:
      - run_tests
    prompt: >-
      Projet client : {{ inputs.projectPath }}.

      Versions (actuelle et cible) : {{ steps.pick_version.result }}

      Plan de migration : {{ steps.read_release_notes.result }}

      ng update et migrations appliquées : {{ steps.migrate.result }}

      Vérifications (build/tests) : {{ steps.run_tests.result }}

      Si une étape précédente indique « AUCUNE MISE À JOUR NÉCESSAIRE », OU si « git status
      --porcelain » ne montre AUCUNE modification dans le dépôt du projet client, NE COMMITE RIEN,
      NE PUSHE RIEN : retourne uniquement « Déjà à jour, aucun commit nécessaire » et arrête-toi là.

      Sinon, commite la montée de version directement sur la branche par défaut « main » du dépôt DU
      PROJET CLIENT (PAS de branche dédiée, PAS de pull request) : 1. Assure-toi d'être sur « main »
      et à jour (git checkout main && git pull). 2. Vérifie le diff (« git status », « git diff ») :
      n'ajoute au commit QUE les fichiers relevant
         strictement de la migration (dépendances, code migré, config de version). Si un fichier hors
         périmètre s'y est glissé (test ajouté arbitrairement, fichier sans rapport), NE L'INCLUS PAS
         dans le commit et signale-le dans ton retour.
      3. Commit de ces changements en un seul commit conventionnel, avec EXACTEMENT ce gabarit de
         message (rien avant, rien après, aucune ligne ajoutée) :

         chore: mise à jour Angular vers <version-cible>

         <résumé factuel en 1-3 lignes des changements (packages mis à jour, migrations manuelles
         appliquées), sans mention d'outil ni d'IA>

      4. Le message de commit (titre ET corps) ne doit contenir STRICTEMENT AUCUNE ligne de trailer
      ni
         mention d'outil IA : PAS de « Co-authored-by », « Signed-off-by », « Generated by »,
         « 🤖 », ni aucune mention de Claude/Cursor/IA/assistant/agent. Écris ce message toi-même via
         « git commit -m », sans option ni configuration (template, hook, trailer.*) qui ajouterait
         quoi que ce soit au-delà de ce gabarit.
      5. Après le commit, vérifie avec « git log -1 --format=%B » que le message ne contient aucune
      de
         ces mentions. Si c'est le cas, corrige-le avec « git commit --amend -m "..." » avant de
         pousser.
      6. Push directement sur « main » vers le remote GitHub du projet.

      Ne procède au commit/push QUE si l'étape run_tests confirme build et tests VERTS. En cas
      d'échec des vérifications, n'écris rien sur main et signale-le.

      Retourne : SHA du commit poussé, branche (main), résumé des fichiers modifiés (ou « Déjà à
      jour, aucun commit nécessaire » le cas échéant).
