# yaml-language-server: $schema=./workflow.schema.json
name: angular-upgrade
description: >-
  Mise à jour périodique du projet Angular client (dépôt/workspace courant) vers la dernière version
  stable du major courant (montées patch et minor autorisées, jamais de saut majeur). Les tags,
  releases et documentation sont lus exclusivement depuis le dépôt officiel angular/angular, jamais
  depuis le dépôt du projet à mettre à jour.
inputs:
  event:
    description: >-
      Payload brute de l'évènement déclencheur (webhook / cron). Ce workflow étant déclenché par
      planification, la payload ne contient rien d'exploitable : le projet Angular est connu et
      unique (« sources/frontend »), la source des versions est le dépôt officiel angular/angular,
      et la politique de version est fixe (patch/minor uniquement, jamais de saut majeur).
steps:
  - id: fetch_tags
    title: Récupérer les tags Angular
    agent: angular-researcher
    mode: read-only
    prompt: >-
      Source UNIQUE : dépôt officiel Angular « https://github.com/angular/angular» sur GitHub (PAS
      le dépôt du projet client).

      Récupère les tags et releases stables. Liste les versions semver publiées, triées par ordre
      croissant.

      Retourne : liste des versions, dernière version stable, tags LTS éventuels. Aucune lecture du
      workspace projet.
  - id: pick_version
    title: Choisir la version cible
    agent: planner
    mode: read-only
    receives:
      - fetch_tags
    prompt: >-
      Le projet Angular est connu et unique : « sources/frontend » (workspace simple, npm). Lis
      directement « sources/frontend/package.json » pour relever la version courante de
      @angular/core et @angular/cli.

      Versions disponibles sur le DÉPÔT OFFICIEL Angular : {{ steps.fetch_tags.result }}

      Choisis comme version cible la DERNIÈRE version stable disponible DANS LE MAJOR COURANT du
      projet (la minor la plus haute du major courant, et son dernier patch) : les montées patch ET
      minor sont autorisées, jamais de saut de version majeure. Si le projet est déjà sur la dernière
      minor du major, cible simplement le dernier patch de cette minor.

      Retourne : version actuelle, version cible, type de saut (patch/minor/major), justification, et
      commandes ng update exactes (@angular/core@X @angular/cli@X et packages associés) à exécuter
      dans le projet client.
  - id: read_release_notes
    title: Analyser les notes de version et planifier
    agent: angular-researcher
    mode: read-only
    receives:
      - pick_version
    prompt: >-
      Projet client : « sources/frontend ».

      Versions (actuelle et cible) : {{ steps.pick_version.result }}

      Lis les release notes, CHANGELOG et update guide UNIQUEMENT sur «
      https://github.com/angular/angular/ » et la documentation Angular officielle, entre ces deux
      versions.

      Ne pas confondre avec l'historique Git du dépôt projet.

      1. ANALYSE (faits amont) : breaking changes, migrations automatiques Angular, dépréciations,
      prérequis Node.js/npm, actions manuelles requises.

      2. PLAN D'EXÉCUTION (dépôt du projet client) : élabore un plan ordonné — sauvegarde/commit
      préalable, prérequis, séquence ng update (regroupée en une seule commande pour tous les packages
      Angular concernés), migrations, vérifications intermédiaires, rollback si échec. Vérifie la
      disponibilité npm des versions ciblées et ajuste-les si nécessaire (ex. Material/CDK parfois en
      retard sur le core), en justifiant tout écart.
  - id: migrate
    title: Exécuter ng update et migrer le code
    agent: angular-specialist
    mode: edit
    receives:
      - read_release_notes
    prompt: >-
      Cible : PROJET CLIENT uniquement (« sources/frontend »). Projet connu et unique : ne PAS
      lister les projets (pas de list_projects), ne PAS lancer de « ng update » nu de découverte —
      les versions et packages exacts sont déjà fournis ci-dessous.

      Plan de migration : {{ steps.read_release_notes.result }}

      Versions (actuelle et cible) : {{ steps.pick_version.result }}

      1. EXÉCUTE ng update en UN SEUL appel regroupant TOUS les packages Angular concernés
      (@angular/core, @angular/cli, et le cas échéant @angular/material, @angular/cdk,
      @angular/material-luxon-adapter…) avec leurs versions cibles respectives dans la même commande.
      Cela lance les migrations automatiques (schematics) et évite l'arbre git sali entre deux
      updates et l'échec/retry avec --allow-dirty. N'utilise --force ou --allow-dirty que si
      réellement nécessaire, en le justifiant.

      2. APPLIQUE ensuite les migrations manuelles restantes sur le code du projet, non couvertes par
      les schematics : breaking changes, APIs dépréciées, imports, templates, configuration
      (angular.json, tsconfig, eslint), dépendances peer incompatibles.

      NE PAS builder ni lancer les tests ici : build, tests et lint sont couverts par l'étape
      « run_tests ». Une seule vérification « ng version » suffit pour confirmer les versions
      installées.

      Documente chaque commande exécutée, les sorties, warnings et erreurs éventuelles, ainsi que les
      migrations manuelles appliquées.
  - id: run_tests
    title: Vérifier build et tests
    agent: tester
    mode: edit
    receives:
      - migrate
    prompt: >-
      Projet client : « sources/frontend ».

      Versions (actuelle et cible attendue) : {{ steps.pick_version.result }}

      Dans le dépôt DU PROJET : lance ng build (prod si disponible), tests unitaires (--watch=false
      ou équivalent CI), et lint si configuré.

      Vérifie que @angular/core correspond à la version cible dans le package.json du projet client.
      Signale toute régression.
    review:
      agent: judge
      maxRepeats: 2
      onRedo: resume
      criteria: >-
        Le build passe, les tests passent, @angular/core est à la version cible, les migrations sont
        appliquées et le diff ne contient pas de régression critique.
      onExhausted:
        goto: migrate
        maxLoops: 1
        then: fail
  - id: commit_main
    title: Committer la montée de version sur main
    agent: github-publisher
    mode: edit
    receives:
      - run_tests
    prompt: >-
      Projet client : « sources/frontend ».

      Versions (actuelle et cible) : {{ steps.pick_version.result }}

      Plan de migration : {{ steps.read_release_notes.result }}

      ng update et migrations appliquées : {{ steps.migrate.result }}

      Vérifications (build/tests) : {{ steps.run_tests.result }}

      Commite la montée de version directement sur la branche par défaut « main » du dépôt DU PROJET
      CLIENT (PAS de branche dédiée, PAS de pull request) :
      1. Assure-toi d'être sur « main » et à jour (git checkout main && git pull).
      2. Commit de TOUS les changements de la migration en un seul commit conventionnel clair, message
         « chore: mise à jour Angular vers <version-cible> » (AUCUNE attribution IA).
      3. Push directement sur « main » vers le remote GitHub du projet.

      Ne procède au commit/push QUE si l'étape run_tests confirme build et tests VERTS. En cas
      d'échec des vérifications, n'écris rien sur main et signale-le.

      Retourne : SHA du commit poussé, branche (main), résumé des fichiers modifiés.
