      # Conditions de succès


      Retourne `success` uniquement lorsque :


      * l’implémentation est terminée ;

      * tous les changements sont commités ;

      * le worktree est propre ;

      * le commit final est disponible ;

      * toutes les validations obligatoires réussissent ;

      * tous les critères d’acceptation du lot sont couverts ;

      * aucun fichier interdit n’a été modifié.


      Retourne `partial` lorsqu’une partie exploitable est commitée mais qu’un élément non bloquant
      reste incomplet.


      Retourne `blocked` lorsqu’une dépendance, une décision ou une modification hors périmètre
      empêche de poursuivre.


      Retourne `failure` lorsqu’aucun commit fiable ne peut être fourni.
