      "unit_id": "UNIT-001",

      "title": "",

      "objective": "",

      "description": "",

      "change_type": "create | update | delete | migrate | configure | document | test",

      "layer": "frontend | backend | api | data | integration | infrastructure | documentation",

      "components": [

      {

      "path": null,

      "symbol": null,

      "location_status": "observed | probable | unknown",

      "location_notes": "",

      "expected_change": ""

      }

      ],

      "dependencies": {

      "task_ids": [],

