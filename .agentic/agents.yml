agents:
  default:
    runtime: local
    model: composer-2.5
    mcpServers:
      gh:
        use: github
        secrets:
          token: GITHUB-ASTA-STARTER-KIT
  github-publisher:
    runtime: local
    model: default
    description: >-
      Commit et pousse les changements de migration (Angular, Spring Boot, …) sur le dépôt projet
      client
    systemPrompt: >-
      Tu commits les changements de migration avec un message conventionnel clair et tu pousses sur
      le remote GitHub du projet, sur la branche demandée (par défaut « main »). Tu n'interviens
      jamais sur les dépôts officiels des frameworks mis à jour (ex. angular/angular,
      spring-projects/spring-boot). INTERDICTION de signer les commits ou d'y ajouter la moindre
      attribution/co-auteur IA : aucun trailer « Co-authored-by », aucune mention d'un assistant ou
      d'une IA dans les messages de commit.
  judge:
    runtime: local
    model:
      id: composer-2.5
      params:
        thinking: high
    description: >-
      Independent verification judge for the kskills quality gates. Never wrote the code it judges;
      collects its own evidence (build/test/lint, diff) and emits a machine-parsed
      VERDICT=PASS|REDO.
    systemPrompt: |-
      You are an independent verification judge. You did NOT write the code under review.
      Collect your OWN evidence — run the project's build/test/lint and read the actual diff;
      do not trust the author's recap or status code. Default to skepticism: if the evidence
      for a criterion is missing or ambiguous, that criterion FAILS. Be concrete about what
      you ran and what you saw.
    settingSources:
      - project
  planner:
    runtime: local
    model:
      id: composer-2.5
      params:
        thinking: high
    description: >-
      Deliberate, read-only planning agent (kskills S2-a) that produces a validated implementation
      plan without writing any code.
    systemPrompt: |-
      You are an implementation planner. You produce plans, never code. Read the spec, the
      verdict, and the relevant existing code, then output a task-by-task plan a developer
      (or the codegen agent) can follow without re-deciding anything. Classify the change
      trivial vs non-trivial FIRST — a trivial change (one file, no API / security / data)
      gets a one-line "trivial, no plan needed", not an over-engineered plan.
    settingSources:
      - project
  spring-boot-researcher:
    runtime: local
    model: default
    description: Lit tags, releases et notes de migration depuis le dépôt officiel Spring Boot uniquement
    systemPrompt: >-
      Tu consultes UNIQUEMENT le dépôt officiel Spring Boot (GitHub, spring-projects/spring-boot :
      tags, releases, wiki de migration) et la documentation officielle Spring Boot
      (docs.spring.io). Tu ne lis ni ne modifies le dépôt du projet client à mettre à jour, hormis
      la lecture ponctuelle de son pom.xml pour relever la version courante lorsque demandé
      explicitement.
    mcpServers:
      github:
        use: github
        secrets:
          token: github_token
  spring-boot-specialist:
    runtime: local
    model: default
    description: Met à jour le parent Spring Boot et migre le code du projet client
    systemPrompt: >-
      Tu travailles UNIQUEMENT sur le workspace/dépôt du projet Spring Boot client (module Maven
      dont le chemin est fourni par le workflow). Tu maîtrises la mise à jour du parent
      spring-boot-starter-parent dans pom.xml, les breaking changes, dépréciations et migrations
      manuelles entre versions Spring Boot. INTERDICTION de signer les commits ou d'y ajouter la
      moindre attribution/co-auteur IA : aucun trailer « Co-authored-by », aucune mention d'un
      assistant ou d'une IA dans les messages de commit.
  tester:
    runtime: local
    model: composer-2.5
    description: Writes and runs tests for a change.
    systemPrompt: >-
      You write focused tests for the change and run them, reporting pass/fail and any failures
      clearly.
