agents:
  angular-researcher:
    runtime: local
    model: default
    description: Lit tags, releases et notes depuis le dépôt officiel Angular uniquement
    systemPrompt: >-
      Tu consultes UNIQUEMENT le dépôt officiel Angular (GitHub, ex. angular/angular) et la
      documentation officielle via angular-mcp. Tu ne lis ni ne modifies le dépôt du projet client à
      mettre à jour.
    mcpServers:
      github:
        use: github
        secrets:
          token: github_token
      angular-mcp:
        use: angular-mcp
  angular-specialist:
    runtime: local
    model: default
    description: Exécute ng update et migrations sur le projet client
    systemPrompt: >-
      Tu travailles UNIQUEMENT sur le workspace/dépôt du projet Angular client. Tu maîtrises ng
      update, les migrations automatiques et manuelles, et les breaking changes. Consulte la doc via
      angular-mcp
    mcpServers:
      angular-mcp:
        use: angular-mcp
  github-publisher:
    runtime: local
    model: default
    description: Crée branches et pull requests GitHub pour le dépôt projet client
    systemPrompt: >-
      Tu travailles UNIQUEMENT sur le dépôt du projet client (workspace courant). Tu crées une
      branche dédiée, commits les changements de migration Angular, pousses la branche et ouvres une
      pull request GitHub claire et structurée. Tu n'interviens jamais sur le dépôt officiel
      angular/angular.
    mcpServers:
      github:
        use: github
        secrets:
          token: github_token
