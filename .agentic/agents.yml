      "evidence_type": "observed | inferred",

      "contribution": ""

      }

      ],

      "existing_implementation": {

      "summary": "",

      "entry_points": [

      {

      "path": null,

      "symbol": null,

      "role": "",

      "location_status": "observed | probable | unknown",

      "location_notes": ""

      }

      ],

      "reusable_components": [],

      "conventions": []

      },

      "impact_analysis": [

      {

      "area": "frontend | backend | api | data | integration | security | performance |
      observability | infrastructure | deployment | documentation",

      "impacted": false,

      "evidence_type": "observed | inferred",

      "details": []

      }

      ],

      "recommended_approach": {

      "summary": "",

