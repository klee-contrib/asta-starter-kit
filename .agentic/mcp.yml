# Catalogue MCP du projet.
# Declare ici des serveurs MCP REUTILISABLES, references par `use: <nom>` dans agents.yml.
# Les agents peuvent toujours declarer du MCP INLINE directement dans agents.yml.
servers:
  # Serveur MCP officiel Angular (Angular CLI). Fournit doc officielle, bonnes pratiques
  # et outils de modernisation. Demarre en stdio via npx dans le projet front.
  angular-cli:
    type: stdio
    command: npx
    args: ["@angular/cli@latest", "mcp"]
    cwd: sources/frontend
